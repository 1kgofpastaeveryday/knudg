name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16@sha256:4b7183ac05f8ef417db21fd72d71047a4238340c261d3cc3ddb6d579ab5071ae
        env:
          POSTGRES_DB: knudg
          POSTGRES_USER: knudg_migration
          POSTGRES_PASSWORD: knudg_migration
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U knudg_migration -d knudg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://knudg_migration:knudg_migration@localhost:54329/knudg
      KNUDG_OPERATOR_TOKEN: ci-local-token
      KNUDG_API_URL: http://127.0.0.1:8765
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run setup:python
      - run: npm run public:release-check
      - run: npm run secret:scan -- --history
      - run: npm run py -- scripts/migrate.py up
      - run: npm run py -- -m pytest tests/test_knudg_closed_api.py tests/test_knudg_live_agent.py tests/test_task_profile_schema.py tests/test_knudg_task_profile_builder.py tests/test_retrieval_panel_schema.py tests/test_knudg_client_config.py
      - run: npm run gates:all
      - run: npm run check:lp
