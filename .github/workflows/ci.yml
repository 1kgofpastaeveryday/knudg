name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  core:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: knudg
          POSTGRES_USER: knudg_migration
          POSTGRES_PASSWORD: knudg_migration
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U knudg_migration -d knudg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://knudg_migration:knudg_migration@localhost:54329/knudg
      KNUDG_OPERATOR_TOKEN: ci-local-token
      KNUDG_API_URL: http://127.0.0.1:8765
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python scripts/migrate.py up
      - run: python -m pytest tests/test_knudg_closed_api.py tests/test_knudg_live_agent.py tests/test_task_profile_schema.py tests/test_knudg_client_config.py
      - run: npm run check:lp
