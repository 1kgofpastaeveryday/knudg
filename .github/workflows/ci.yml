name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
        env:
          POSTGRES_DB: knudg
          POSTGRES_USER: knudg_migration
          POSTGRES_PASSWORD: knudg_migration
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U knudg_migration -d knudg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://knudg_migration:knudg_migration@localhost:54329/knudg
      KNUDG_OPERATOR_TOKEN: ci-local-token
      KNUDG_API_URL: http://127.0.0.1:8765
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run setup:python
      - run: npm run public:release-check
      - run: npm run secret:scan -- --history
      - run: npm run py -- scripts/migrate.py up
      - run: npm run py -- -m pytest tests/test_knudg_closed_api.py tests/test_knudg_live_agent.py tests/test_task_profile_schema.py tests/test_knudg_task_profile_builder.py tests/test_retrieval_panel_schema.py tests/test_knudg_client_config.py
      - run: npm run check:lp
