services:
  postgres:
    image: postgres:16
    container_name: knudg-postgres
    # Development-only credentials for local self-host testing.
    # Do not use these values in production.
    environment:
      POSTGRES_DB: knudg
      POSTGRES_USER: knudg_migration
      POSTGRES_PASSWORD: knudg_migration
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knudg_migration -d knudg"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - knudg-postgres-data:/var/lib/postgresql/data

volumes:
  knudg-postgres-data:
