<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">Knudg moves the agent starting point forward</title>
  <desc id="desc">Legacy Codex starts from the beginning. Codex with Knudg begins after shared exploration and continues toward the goal.</desc>
  <defs>
    <marker id="arrow-black" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 9 6 2 10" fill="none" stroke="#121820" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 9 6 2 10" fill="none" stroke="#1477f8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .ink { fill: #121820; }
      .blue { fill: #1477f8; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 900; letter-spacing: 0; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 0; }
      .line { stroke-width: 4; stroke-linecap: round; }
      .legacy-line { stroke: #121820; marker-end: url(#arrow-black); }
      .future-line { stroke: #1477f8; marker-end: url(#arrow-blue); }
    </style>
  </defs>

  <rect class="bg" width="1400" height="500" rx="24"/>

  <text class="title ink" x="70" y="72">Legacy Codex</text>
  <text class="label ink" x="70" y="124">Start</text>
  <circle cx="96" cy="160" r="10" fill="#121820"/>
  <line class="line legacy-line" x1="112" y1="160" x2="1270" y2="160"/>
  <circle cx="1310" cy="160" r="10" fill="#121820"/>
  <text class="label ink" x="1280" y="124">Goal</text>

  <text class="title blue" x="70" y="284">Codex with Knudg</text>

  <g aria-label="Knudg shared exploration">
    <rect x="70" y="350" width="165" height="18" rx="9" fill="#ef5b4c"/>
    <rect x="222" y="350" width="172" height="18" fill="#ffb020"/>
    <rect x="381" y="350" width="170" height="18" fill="#16a66a"/>
    <rect x="538" y="350" width="164" height="18" fill="#12b5cb"/>
    <rect x="689" y="350" width="136" height="18" rx="9" fill="#1477f8"/>
  </g>
  <text class="label blue" x="300" y="414">Knudg: shared exploration</text>

  <circle cx="875" cy="359" r="15" fill="#1477f8"/>
  <text class="label blue" x="844" y="324">Start</text>
  <line class="line future-line" x1="900" y1="359" x2="1270" y2="359"/>
  <circle cx="1310" cy="359" r="10" fill="#121820"/>
  <text class="label ink" x="1280" y="324">Goal</text>
</svg>
